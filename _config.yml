# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage › http://www.lingoes.net/en/translator/langcode.htm
lang: en

# Change to your timezone › https://zones.arilyn.cc
timezone: Asia/Kolkata

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: Karmanya's Sec Blog # the main title

tagline: AD Pentesting # it will display as the subtitle

description: >- # used by seo meta and the atom feed
  Penetration testing writeups, security research, and technical deep dives.

# Fill in the protocol & hostname for your site.
url: "https://Karmanya03-MartiniAD-Writeup.github.io"

github:
  username: Karmanya03 # change to your GitHub username if different

twitter:
  username: # change to your Twitter username if you have one for infosec

social:
  # It will be displayed as the default author of the posts and the copyright owner in the Footer
  name: Karmanya Ravindra
  email: karmanya03@proton.me
  fediverse_handle: 
  links:
    - https://github.com/Karmanya03

# Site Verification Settings
webmaster_verifications:
  google: 
  bing: 
  alexa: 
  yandex: 
  baidu: 
  facebook: 

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

# Web Analytics Settings (Leave blank until you want to track traffic)
analytics:
  google:
    id: 
  goatcounter:
    id: 
  umami:
    id: 
    domain: 
  matomo:
    id: 
    domain: 
  cloudflare:
    id: 
  fathom:
    id: 

# Page views settings
pageviews:
  provider: 

# Prefer color scheme setting.
theme_mode: dark # [light | dark] - Locked to dark mode for the hacker aesthetic

# The CDN endpoint for media resources.
cdn:

# the avatar on sidebar, support local or CORS resources
avatar: /assets/img/avatar.png # Drop a cool profile pic or logo here later!

# The URL of the site-wide social preview image used in SEO `og:image` meta tag.
social_preview_image: 

# boolean type, the global switch for TOC in posts.
toc: true

comments:
  # Global switch for the post-comment system. Keeping it empty means disabled.
  provider: # [disqus | utterances | giscus] - giscus is highly recommended for GitHub!
  disqus:
    shortname: 
  utterances:
    repo: 
    issue_term: 
  giscus:
    repo: 
    repo_id:
    category:
    category_id:
    mapping: 
    strict: 
    input_position: 
    lang: 
    reactions_enabled: 

# Self-hosted static assets, optional › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: 
    env: 

pwa:
  enabled: true # The option for PWA feature (installable)
  cache:
    enabled: true # The option for PWA offline cache
    deny_paths:

paginate: 10

# The base URL of your site (Leave empty if hosted at the root of the domain)
baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true # Enable comments in posts.
      toc: true # Display TOC column in posts.
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
